<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORAL DRIFT // Nostalgia Glow</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            background-color: #160F29;
            color: #D6C7FF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 900px;
            background: #160F29;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 40px; text-align: center; background: rgba(22, 15, 41, 0.9);
            z-index: 10; transition: opacity 0.3s ease;
        }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        h1 {
            font-size: 2.5rem; font-weight: 900; letter-spacing: 4px;
            color: #FF6B6B; text-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
            margin-bottom: 10px; text-transform: uppercase;
        }
        p.subtitle { font-size: 1rem; color: #D6C7FF; opacity: 0.8; margin-bottom: 40px; }
        .roast-text {
            font-size: 1.2rem; font-weight: 600; color: #D6C7FF;
            line-height: 1.6; margin-bottom: 40px; max-width: 80%; min-height: 60px;
        }
        .btn {
            background: transparent; border: 2px solid #FF6B6B; color: #FF6B6B;
            padding: 15px 40px; font-size: 1rem; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; border-radius: 4px;
            transition: all 0.2s ease; box-shadow: 0 0 15px rgba(255, 107, 107, 0.1);
        }
        .btn:hover { background: #FF6B6B; color: #160F29; box-shadow: 0 0 25px rgba(255, 107, 107, 0.5); }
        #ui {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; font-family: monospace;
            font-size: 1.2rem; font-weight: bold; color: #D6C7FF; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <audio id="bgMusic" src="mirai_soundworks-dreamwave-overdrive-408926.mp3" loop></audio>

        <div id="ui">
            <div id="scoreDisplay">SCORE: 0</div>
            <div id="shieldDisplay" style="color: #FF6B6B;">SHIELD: 100%</div>
        </div>

        <div id="startScreen" class="screen">
            <h1>CORAL DRIFT</h1>
            <p class="subtitle">An Infinite Space Journey // By Lumora</p>
            <button class="btn" onclick="startGame()">Deploy Ship</button>
        </div>

        <div id="gameOverScreen" class="screen hidden">
            <h1>LOOP BROKEN</h1>
            <div id="roastContainer" class="roast-text"></div>
            <button class="btn" onclick="restartGame()">Reboot Loop</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bgMusic');

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameActive = false;
        let score = 0;
        let shield = 100;
        let frames = 0;
        let animationId;

        let ship = { x: canvas.width / 2, y: canvas.height - 60, width: 30, height: 40, color: '#FF6B6B' };
        let lasers = [];
        let particles = [];
        let sparks = [];

        const roasts = [
            "Wait, was that a pebble? Did you just lose to a space pebble? 🪨",
            "So... Mr. Gamer... You lose. My grandmother has faster thumbs, and she's a ghost. 👻",
            "Oops! Your space captain license just got revoked by a glitching meteor. ☄️",
            "Aha! Is that the sound of a total laser-miss? Yes, I believe it is. 🔇",
            "Your ship just got vaporized, but at least your space-dust looks aesthetically pleasing. 💅",
            "Wow... A direct hit. Just not by you. Try aiming next time? 👁️",
            "Your skills just disappeared outside the frame. Sound familiar? 📸",
            "That's awkward... You just got outplayed by a physics simulation of a particle. 🧱",
            "Hold on... Was that a deliberate tactical retreat, or did you just get obliterated? 🛸",
            "Well, well, well... The Laser Vortex won again. What a surprise. 🌀"
        ];

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            ship.x = e.clientX - rect.left;
        });
        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            ship.x = e.touches[0].clientX - rect.left;
        });

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            gameActive = true;
            score = 0;
            shield = 100;
            frames = 0;
            particles = [];
            lasers = [];
            sparks = [];
            updateUI();
            bgMusic.play().catch(() => console.log("Audio waiting..."));
            loop();
        }

        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startGame();
        }

        function gameOver() {
            gameActive = false;
            bgMusic.pause();
            cancelAnimationFrame(animationId);
            const randomRoast = roasts[Math.floor(Math.random() * roasts.length)];
            document.getElementById('roastContainer').innerText = randomRoast;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
            document.getElementById('shieldDisplay').innerText = `SHIELD: ${shield}%`;
        }

        function createSparks(x, y) {
            for (let i = 0; i < 8; i++) {
                sparks.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1, color: '#D6C7FF'
                });
            }
        }

        function loop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frames++;

            // Draw Ship
            ctx.fillStyle = ship.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = ship.color;
            ctx.beginPath();
            ctx.moveTo(ship.x, ship.y - ship.height/2);
            ctx.lineTo(ship.x + ship.width/2, ship.y + ship.height/2);
            ctx.lineTo(ship.x - ship.width/2, ship.y + ship.height/2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Auto-fire Lasers
            if (frames % 15 === 0) {
                lasers.push({ x: ship.x, y: ship.y - 20, width: 4, height: 15, speed: 8 });
            }

            // Move Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.y -= l.speed;
                ctx.fillStyle = '#FF6B6B';
                ctx.fillRect(l.x - l.width/2, l.y, l.width, l.height);
                if (l.y < 0) lasers.splice(i, 1);
            }

            // Spawn Particles
            let spawnInterval = Math.max(20, 60 - Math.floor(score/20));
            if (frames % spawnInterval === 0) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    size: Math.random() * 12 + 8,
                    speed: Math.random() * 2 + 2 + (score * 0.005)
                });
            }

            // Move Particles & Collisions
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.y += p.speed;
                
                ctx.fillStyle = '#D6C7FF';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (p.y > canvas.height) {
                    shield -= 10;
                    particles.splice(i, 1);
                    updateUI();
                    if (shield <= 0) {
                        gameOver();
                        return; // Stop processing frame
                    }
                    continue;
                }

                for (let j = lasers.length - 1; j >= 0; j--) {
                    let l = lasers[j];
                    let dist = Math.hypot(p.x - l.x, p.y - l.y);
                    if (dist < p.size + Math.max(l.width, l.height)/2) {
                        createSparks(p.x, p.y);
                        particles.splice(i, 1);
                        lasers.splice(j, 1);
                        score += 10;
                        updateUI();
                        break; 
                    }
                }
            }

            // Move Sparks
            for (let i = sparks.length - 1; i >= 0; i--) {
                let s = sparks[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life -= 0.05;
                if (s.life <= 0) {
                    sparks.splice(i, 1);
                } else {
                    ctx.globalAlpha = s.life;
                    ctx.fillStyle = s.color;
                    ctx.fillRect(s.x, s.y, 3, 3);
                    ctx.globalAlpha = 1.0;
                }
            }

            animationId = requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
